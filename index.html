<!DOCTYPE html>
<html lang="en">
<head>
    <!--Header stuff-->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <meta name="author" content="EmpowerED">
    <meta name="description" content="Fueling tomorrow's innovators in STEM">
    <meta name="keywords" content="STEM, computer science, empowerED, York Region, high school, middle school">
    <link rel="icon" type="images/png" href="images/logo-clear.png">
    <title>EmpowerED</title>
   
    <!--Font stuff-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Sorts+Mill+Goudy:wght@400;700&display=swap" rel="stylesheet">
    
    <!--Animation Package-->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

    <!--Icon Package-->
    <script src="https://kit.fontawesome.com/c6ffe2ba2c.js" crossorigin="anonymous"></script>

    <!--CSS-->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="queries.css" />

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
        }
        .intro-text h1 {
            font-family: 'Sorts Mill Goudy', serif;
            font-size: 115px;
            text-align: center;
        }
        .intro-text p {
            font-family: 'Sorts Mill Goudy', serif;
            font-size: 35px;
            text-align: center;
        }
        .lumie-img {
            display: block;
            margin: 15px auto; /* Adjust margin as needed */
        }
        .sparkles-png {
            position: absolute;
            left: 0;
            top: calc(50% + 200px); /* Adjust the value as needed */
            transform: translateY(-50%);
            transform: translateX(90%);
            width: 30vh;
        }
        .sparkles2-png {
            position: absolute;
            right: 0; /* Aligns the element to the right edge of the container */
            top: calc(50% + 200px); /* Adjust the value as needed */
            transform: translateY(-50%);
            transform: translateX(-100%); /* Adjust the value as needed */
            width: 30vh;
        }
        .sparkles-container {
            position: relative;
        }
        .banner {
            overflow: hidden;
        }
        header {
            box-sizing: border-box;
            padding-bottom: 0; /* Ensure no padding at the bottom */
        }
    </style>
</head>

<body>
<header>
    <div class="banner">
        <div style="float: left; margin: 3vh;">
            <img src="images/logo-clear.png" class="logo-img" width="70vh">
        </div>
          
        <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <div class="pages"><a class="pages" href="">Home</a></div>
            <div class="pages"><a class="pages" href="newsletter.html">Newsletters</a></div>
            <div class="pages"><a class="pages" href="opportunities.html">Opportunities</a></div>
            <div class="pages"><a class="pages" href="contact.html">Contact</a></div>
            <div class="pages"><a class="pages" href="meet the team.html">Team</a></div>
        </div>
            
        <!-- Use any element to open the sidenav -->
        <span class="open-btn" onclick="openNav()"><i style="padding: 3vh" class="fa-solid fa-bars"></i></span>
    </div>

    <div class="introduction text-center">
        <div class="sparkles-container">
            <img src="images/sparkles.png" class="sparkles-png">
            <img src="images/sparkles2.png" class="sparkles2-png"> <!-- Added this line -->
        </div>
        <div class="intro-text">
            <h1>We're EmpowerED</h1>
            <p>We are a youth-led non-profit organization based in York Region,<br> 
              that aims to excite middle and high school students about computer<br>
              science and other opportunities in STEM!</p>
        </div>
        <img src="images/LumieCool.png" class="lumie-img" style="width: 35vh;">
    </div>
</header>

<script src="script.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
</script>
</body>
</html>
