<!DOCTYPE html>
<html lang="en">
<head>
    <!--Header stuff-->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <meta name="author" content="EmpowerED">
    <meta name="description" content="Fueling tomorrow's innovators in STEM">
    <meta name="keywords" content="STEM, computer science, empowerED, York Region, high school, middle school">
    <link rel="icon" type="images/png" href="images/logo-clear.png">
    <title>EmpowerED</title>

    
   
    <!--Font stuff-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Sorts+Mill+Goudy:wght@400;700&display=swap" rel="stylesheet">
    
    <!--Animation Package-->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

    <!--Icon Package-->
    <script src="https://kit.fontawesome.com/c6ffe2ba2c.js" crossorigin="anonymous"></script>

    <!--CSS-->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="queries.css" />

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: auto; /* Allow scrolling */
            min-height: 150vh; /* Ensure a minimum height */
            background-color: #4e86be; /* Set background color to match.Month-at-Glance */
        }

       .intro-text h1 {
            font-family: 'Sorts Mill Goudy', serif;
            font-size: 4vw;
            text-align: center;
        }
       .intro-text p {
            font-family: 'Sorts Mill Goudy', serif;
            font-size: 2vw;
            text-align: center;
        }
       .lumie-img {
            display: block;
            margin: 1vh auto; /* Adjust margin as needed */
        }
       .sparkles-png {
            position: absolute;
            left: 0;
            top: calc(50% + 15vh); /* Adjust the value as needed */
            transform: translateY(-50%);
            transform: translateX(60%);
            width: 20vh;
        }
       .sparkles2-png {
            position: absolute;
            right: 0; /* Aligns the element to the right edge of the container */
            top: calc(50% + 15vh); /* Adjust the value as needed */
            transform: translateY(-50%);
            transform: translateX(-65%); /* Adjust the value as needed */
            width: 20vh;
        }
       .sparkles-container {
            position: relative;
        }
       .banner {
            overflow: hidden;
        }
        header {
            box-sizing: border-box;
            padding-bottom: 0; /* Ensure no padding at the bottom */
            height: 150vh; /* Increased height for the header section */
            background-color: #81C3D7; /* Set background color to match.Month-at-Glance */
        }
       .Month-at-Glance {
            height: 100vh;
            background: #81C3D7;
            text-align: center;
            position: relative; /* Ensure the section is positioned correctly */
        }
       .Month-at-Glance img {
            width: 100%; /* Make the image cover the entire width */
            height: auto; /* Maintain the aspect ratio */
        }
        /* Side navigation menu */
       .sidenav {
            height: 100%; /* 100% Full-height */
            width: 10%; /* Adjust width as needed */
            position: fixed; /* Stay in place */
            z-index: 1; /* Stay on top */
            top: 0; /* Stay at the top */
            right: -25%; /* Position off the screen initially */
            background-color: #010b43;/* Black */
            overflow-x: hidden; /* Disable horizontal scroll */
            transition: 0.5s; /* 0.5 second transition effect to slide in the sidenav */
            padding-top: 6vh; /* Place content 6vh from the top */
        }

       .sidenav a {
            padding: 2vh 2vh 2vh 4vh;
            text-decoration: none;
            font-size: 2.5vh;
            color: #ffffff;
            display: block;
            transition: 0.3s;
        }

       .sidenav a:hover {
            color: #f1f1f1;
        }

       .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 2.5vh;
            font-size: 3.6vh;
            margin-left: 5vh;
        }

       .open-btn {
            font-size: 3vh;
            cursor: pointer;
            position: absolute;
            top: 2.5vh;
            right: 2.5vh; /* Adjust to position correctly */
        }
    </style>
</head>

<body>
<header>
    <div class="banner">
        <div style="float: left; margin: 2vh;">
            <img src="images/logo-clear.png" class="logo-img" width="5vw">
        </div>
          
        <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <div class="pages"><a class="pages" href="index.html">Home</a></div>
            <div class="pages"><a class="pages" href="newsletter.html">Newsletters</a></div>
            <div class="pages"><a class="pages" href="opportunities.html">Opportunities</a></div>
            <div class="pages"><a class="pages" href="contact.html">Contact</a></div>
            <div class="pages"><a class="pages" href="meet the team.html">Team</a></div>
        </div>
            
        <!-- Use any element to open the sidenav -->
        <span class="open-btn" onclick="openNav()"><i style="padding: 2vh" class="fa-solid fa-bars"></i></span>
    </div>

    <div class="introduction text-center">
        <div class="sparkles-container">
            <img src="images/sparkles.png" class="sparkles-png">
            <img src="images/sparkles2.png" class="sparkles2-png">
        </div>
        <div class="intro-text">
            <h1>We're EmpowerED</h1>
            <p>We are a youth-led non-profit organization based in York Region,<br> 
              that aims to excite middle and high school students about computer<br>
              science and other opportunities in STEM!</p>
        </div>
        <img src="images/LumieCool.png" class="lumie-img" style="width: 40vh;">
    </div>
</header>

<div class="Month-at-Glance">
    <img src="images/o.png" alt="Month at Glance">
</div>

<script src="script.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
</script>
<script>
    function openNav() {
        document.getElementById("mySidenav").style.right = "0";
    }

    function closeNav() {
        document.getElementById("mySidenav").style.right = "-25%";
    }
</script>
</body>
</html>
